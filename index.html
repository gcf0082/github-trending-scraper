<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Trending</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 16px;
            line-height: 1.5;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .repo-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: #30363d;
            border-radius: 8px;
            overflow: hidden;
        }
        .repo-item {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 12px;
            padding: 14px 16px;
            background: #161b22;
        }
        .repo-item:hover {
            background: #21262d;
        }
        .repo-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .repo-time {
            font-size: 0.8em;
            color: #8b949e;
        }
        .repo-stars {
            font-size: 1em;
            font-weight: 600;
            color: #e3b341;
        }
        .repo-today {
            font-size: 0.9em;
            font-weight: 600;
            color: #3fb950;
        }
        .repo-btn {
            background: transparent;
            border: none;
            color: #8b949e;
            cursor: pointer;
            padding: 2px 0;
            font-size: 0.8em;
            text-align: left;
        }
        .repo-btn:hover {
            color: #c9d1d9;
        }
        .repo-right {
            min-width: 0;
        }
        .repo-name {
            font-size: 1em;
            font-weight: 600;
            margin-bottom: 3px;
        }
        .repo-name a {
            color: #58a6ff;
            text-decoration: none;
        }
        .repo-name a:hover {
            text-decoration: underline;
        }
        .repo-name a:visited {
            color: #8b949e;
        }
        .repo-desc {
            color: #8b949e;
            font-size: 0.85em;
            line-height: 1.4;
            word-break: break-word;
        }
        .repo-details {
            display: none;
            background: #0d1117;
            padding: 10px;
            margin-top: 8px;
            border-radius: 6px;
            font-size: 0.8em;
            color: #8b949e;
        }
        .repo-details.show {
            display: block;
        }
        .repo-details-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .repo-details-row span {
            color: #c9d1d9;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
            background: #161b22;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="repo-list" id="repoList">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('datas/latest.json');
                const data = await response.json();
                
                const repoList = document.getElementById('repoList');
                repoList.innerHTML = data.projects.map((p, i) => `
                    <div class="repo-item">
                        <div class="repo-left">
                            <div class="repo-time">${formatTime(p.fetched_at)}</div>
                            <div class="repo-stars">${p.stars.toLocaleString()}</div>
                            <div class="repo-today">+${p.today_stars.toLocaleString()}</div>
                            <button class="repo-btn" onclick="toggleDetails(${i})">详情</button>
                        </div>
                        <div class="repo-right">
                            <div class="repo-name">
                                <a href="${p.url}" target="_blank">${p.name}</a>
                            </div>
                            <div class="repo-desc">${escapeHtml(p.description || '-')}</div>
                            <div class="repo-details" id="details-${i}">
                                <div class="repo-details-row">
                                    <span>创建: ${formatDate(p.created_at)}</span>
                                    <span>更新: ${formatDate(p.updated_at)}</span>
                                    <span>Fork: ${p.forks.toLocaleString()}</span>
                                    <span>语言: ${p.language || '-'}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('repoList').innerHTML = '<div class="loading">加载失败</div>';
                console.error(e);
            }
        }

        function toggleDetails(i) {
            const details = document.getElementById(`details-${i}`);
            details.classList.toggle('show');
        }

        function formatTime(isoString) {
            if (!isoString) return '-';
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN', { 
                month: '2-digit', 
                day: '2-digit', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        }

        function formatDate(isoString) {
            if (!isoString) return '-';
            return isoString.replace('T', ' ').replace('Z', '');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadData();
    </script>
</body>
</html>
