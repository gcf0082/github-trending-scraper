<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Trending</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 16px;
            line-height: 1.5;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .repo-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: #30363d;
            border-radius: 8px;
            overflow: hidden;
        }
        .repo-item {
            display: grid;
            grid-template-columns: 110px auto 80px 70px;
            gap: 12px;
            padding: 14px 16px;
            background: #161b22;
            align-items: center;
        }
        .repo-item:hover {
            background: #21262d;
        }
        .repo-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .repo-time {
            font-size: 0.8em;
            color: #8b949e;
        }
        .repo-stars {
            font-size: 0.95em;
            font-weight: 600;
            color: #e3b341;
        }
        .repo-content {
            min-width: 0;
        }
        .repo-name {
            font-size: 1em;
            font-weight: 600;
            margin-bottom: 3px;
        }
        .repo-name a {
            color: #58a6ff;
            text-decoration: none;
        }
        .repo-name a:hover {
            text-decoration: underline;
        }
        .repo-desc {
            color: #8b949e;
            font-size: 0.85em;
            line-height: 1.4;
            word-break: break-word;
        }
        .repo-today {
            text-align: right;
            font-weight: 600;
            color: #3fb950;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
            background: #161b22;
            border-radius: 8px;
        }
        @media (max-width: 768px) {
            .repo-item {
                grid-template-columns: 1fr auto;
                gap: 8px;
            }
            .repo-today {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="repo-list" id="repoList">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('datas/latest.json');
                const data = await response.json();
                
                const repoList = document.getElementById('repoList');
                repoList.innerHTML = data.projects.map(p => `
                    <div class="repo-item">
                        <div class="repo-meta">
                            <div class="repo-time">${formatTime(p.fetched_at)}</div>
                            <div class="repo-stars">${p.stars.toLocaleString()}</div>
                        </div>
                        <div class="repo-content">
                            <div class="repo-name">
                                <a href="${p.url}" target="_blank">${p.name}</a>
                            </div>
                            <div class="repo-desc">${escapeHtml(p.description || '-')}</div>
                        </div>
                        <div class="repo-today">+${p.today_stars.toLocaleString()}</div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('repoList').innerHTML = '<div class="loading">加载失败</div>';
                console.error(e);
            }
        }

        function formatTime(isoString) {
            if (!isoString) return '-';
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN', { 
                month: '2-digit', 
                day: '2-digit', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadData();
    </script>
</body>
</html>
