<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Trending 排行榜</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;
            color: #58a6ff;
            margin-bottom: 30px;
        }
        .stats {
            text-align: center;
            margin-bottom: 20px;
            color: #8b949e;
        }
        .repo-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: #30363d;
            border-radius: 8px;
            overflow: hidden;
        }
        .repo-item {
            display: grid;
            grid-template-columns: 110px 1fr 100px 90px;
            gap: 16px;
            padding: 16px;
            background: #161b22;
            align-items: start;
        }
        .repo-item:hover {
            background: #21262d;
        }
        .repo-time {
            font-size: 0.85em;
            color: #8b949e;
            white-space: nowrap;
        }
        .repo-content {
            min-width: 0;
        }
        .repo-name {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .repo-name a {
            color: #58a6ff;
            text-decoration: none;
        }
        .repo-name a:hover {
            text-decoration: underline;
        }
        .repo-desc {
            color: #8b949e;
            font-size: 0.9em;
            line-height: 1.5;
            word-break: break-word;
        }
        .repo-stars {
            text-align: right;
            white-space: nowrap;
        }
        .stars-count {
            display: block;
            font-size: 1.1em;
            font-weight: 600;
            color: #e3b341;
        }
        .stars-label {
            font-size: 0.75em;
            color: #8b949e;
        }
        .repo-today {
            text-align: right;
            white-space: nowrap;
        }
        .today-count {
            display: block;
            font-size: 1.1em;
            font-weight: 600;
            color: #3fb950;
        }
        .today-label {
            font-size: 0.75em;
            color: #8b949e;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
            background: #161b22;
            border-radius: 8px;
        }
        @media (max-width: 768px) {
            .repo-item {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            .repo-stars, .repo-today {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GitHub Trending 排行榜</h1>
        <div class="stats" id="stats">加载中...</div>
        <div class="repo-list" id="repoList">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('datas/latest.json');
                const data = await response.json();
                
                document.getElementById('stats').textContent = 
                    `共 ${data.count} 条记录，按采集时间最新排序`;
                
                const repoList = document.getElementById('repoList');
                repoList.innerHTML = data.projects.map((p, i) => `
                    <div class="repo-item">
                        <div class="repo-time">${formatTime(p.fetched_at)}</div>
                        <div class="repo-content">
                            <div class="repo-name">
                                <a href="${p.url}" target="_blank">${p.name}</a>
                            </div>
                            <div class="repo-desc">${escapeHtml(p.description || '-')}</div>
                        </div>
                        <div class="repo-stars">
                            <span class="stars-count">${p.stars.toLocaleString()}</span>
                            <span class="stars-label">stars</span>
                        </div>
                        <div class="repo-today">
                            <span class="today-count">+${p.today_stars.toLocaleString()}</span>
                            <span class="today-label">today</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('repoList').innerHTML = 
                    '<div class="loading">加载失败，请稍后重试</div>';
                console.error(e);
            }
        }

        function formatTime(isoString) {
            if (!isoString) return '-';
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN', { 
                month: '2-digit', 
                day: '2-digit', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadData();
    </script>
</body>
</html>
